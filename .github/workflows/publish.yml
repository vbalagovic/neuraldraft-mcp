name: Publish to npm + MCP Registry

# Triggered when:
#  - a `v*` tag is pushed (`git tag v0.3.0 && git push origin v0.3.0`)
#  - a push to `main` changes package.json or server.json
#  - manual dispatch from the Actions tab
#
# Publishes to both npm and the official MCP Registry. Each step is idempotent
# (skips if version already exists) so re-runs are safe.

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
    paths:
      - 'package.json'
      - 'server.json'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: npm ci

      - name: Test
        run: npm test --if-present

      - name: Build
        run: npm run build --if-present

      - name: Read package version
        id: pkg
        run: |
          version=$(node -p "require('./package.json').version")
          name=$(node -p "require('./package.json').name")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Skip if already on registry
        id: check
        run: |
          if npm view "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}" version 2>/dev/null; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }} is already on npm — nothing to do."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.check.outputs.already_published == 'false'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Wait briefly so the npm registry has the new version before the MCP
      # registry tries to validate it (the MCP registry pulls package metadata
      # from npm to confirm the version exists).
      - name: Wait for npm propagation
        if: steps.check.outputs.already_published == 'false'
        run: sleep 20

      - name: Install mcp-publisher
        run: |
          curl -sL "https://github.com/modelcontextprotocol/registry/releases/download/v1.7.8/mcp-publisher_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin mcp-publisher
          mcp-publisher --help > /dev/null

      - name: Login to MCP Registry (GitHub OIDC)
        run: mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: |
          if mcp-publisher publish 2>&1 | tee /tmp/mcp-pub.log; then
            echo "MCP registry publish ok"
          else
            # Treat 'already exists' as success so re-runs are idempotent.
            if grep -qiE "already (exists|published)|version.*exists" /tmp/mcp-pub.log; then
              echo "::notice::MCP registry already has this version — skipping."
            else
              cat /tmp/mcp-pub.log
              exit 1
            fi
          fi
